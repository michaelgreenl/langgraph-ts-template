{
    "storage": {
        "workspace": "./.maw/openviking"
    },
    "log": {
        "level": "INFO",
        "output": "stdout"
    },
    "embedding": {
        "dense": {
            "api_base": "https://api.openai.com/v1",
            "api_key": "${OPENAI_API_KEY}",
            "provider": "openai",
            "dimension": 3072,
            "model": "text-embedding-3-large"
        },
        "max_concurrent": 10
    },
    "vlm": {
        "api_base": "https://api.openai.com/v1",
        "api_key": "${OPENAI_API_KEY}",
        "provider": "openai",
        "model": "gpt-4o",
        "max_concurrent": 100
    }
}
